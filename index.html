<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toasty's Tavern</title>
    <link rel="stylesheet" href="memorygame.css">
    <style>
      canvas { display:block; margin:0 auto; }
    </style>
</head>
<body>
    <canvas id="board"></canvas>
    <script src="memorygame.js"></script>

    <audio id="bgmusic" loop>
      <source src="https://github.com/mxmdgames/toastystavern/blob/main/boom-bap-trap-piano-synth-30-bpm-808-chill-mix-wutang_072724.mp3" type="audio/mp3">
    </audio>

    <!-- Mobile D-Pad Controls -->
    <div class="dpad-container" id="dpad">
        <div class="dpad-grid">
            <div class="dpad-cell"></div>
            <button class="dpad-btn dpad-up"    id="dpad-up"    aria-label="Up">▲</button>
            <div class="dpad-cell"></div>
            <button class="dpad-btn dpad-left"  id="dpad-left"  aria-label="Left">◀</button>
            <div class="dpad-cell dpad-center"></div>
            <button class="dpad-btn dpad-right" id="dpad-right" aria-label="Right">▶</button>
            <div class="dpad-cell"></div>
            <button class="dpad-btn dpad-down"  id="dpad-down"  aria-label="Down">▼</button>
            <div class="dpad-cell"></div>
        </div>
    </div>

    <script>
      document.addEventListener("keydown", function startMusic() {
        document.getElementById("bgmusic").play();
        document.removeEventListener("keydown", startMusic);
      });
    </script>
</body>
</html>
