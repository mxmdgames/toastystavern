<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toasty's Tavern</title>
    <link rel="stylesheet" href="memorygame.css">
    <style>
      canvas { display:block; margin:0 auto; }
    </style>
</head>
<body>
    <canvas id="board"></canvas>
    <script src="memorygame.js"></script>
    <audio id="bgmusic" loop>
      <source src="https://github.com/mxmdgames/toastystavern/blob/main/boom-bap-trap-piano-synth-30-bpm-808-chill-mix-wutang_072724.mp3" type="audio/mp3">
    </audio>

    <!-- Mobile D-Pad Controls -->
    <div class="dpad-container" id="dpad">
        <div class="dpad-grid">
            <div class="dpad-cell"></div>
            <button class="dpad-btn dpad-up"    data-dir="U" aria-label="Up">▲</button>
            <div class="dpad-cell"></div>
            <button class="dpad-btn dpad-left"  data-dir="L" aria-label="Left">◀</button>
            <div class="dpad-cell dpad-center"></div>
            <button class="dpad-btn dpad-right" data-dir="R" aria-label="Right">▶</button>
            <div class="dpad-cell"></div>
            <button class="dpad-btn dpad-down"  data-dir="D" aria-label="Down">▼</button>
            <div class="dpad-cell"></div>
        </div>
    </div>

    <script>
      // ── Start music on first keydown ──────────────────────────────
      document.addEventListener("keydown", function startMusic() {
        document.getElementById("bgmusic").play();
        document.removeEventListener("keydown", startMusic);
      });

      // ── Mobile D-Pad ──────────────────────────────────────────────
      (function () {
          const btns = document.querySelectorAll('.dpad-btn');

          function press(e) {
              e.preventDefault();
              const dir = this.dataset.dir;
              if (!dir) return;

              // Same pattern as Pac-Man — set desiredDirection directly
              desiredDirection = dir;

              // Update sprite if your game uses directional images
              if (typeof player !== 'undefined') {
                  if      (dir === 'U') player.image = playerUpImage;
                  else if (dir === 'D') player.image = playerDownImage;
                  else if (dir === 'L') player.image = playerLeftImage;
                  else if (dir === 'R') player.image = playerRightImage;
              }

              this.classList.add('dpad-active');
          }

          function release() {
              this.classList.remove('dpad-active');
          }

          btns.forEach(btn => {
              btn.addEventListener('touchstart', press,   { passive: false });
              btn.addEventListener('touchend',   release, { passive: true  });
              btn.addEventListener('mousedown',  press);
              btn.addEventListener('mouseup',    release);
              btn.addEventListener('mouseleave', release);
          });
      })();
    </script>
</body>
</html>
